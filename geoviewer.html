    function parseCSV(text) {
      const rows = text.trim().split(/\r?\n/).filter(Boolean);
      if (rows.length === 0) return [];

      const header = parseCSVRow(rows[0]).map(h => h.trim().toLowerCase());
      const lonIndex = header.indexOf('lon');
      const latIndex = header.indexOf('lat');
      const nameIndex = header.indexOf('name');
      if (lonIndex === -1 || latIndex === -1) {
        throw new Error('CSV missing lon/lat columns.');
      }

      return rows.slice(1).map((line, idx) => {
        const cols = parseCSVRow(line);
        const lon = parseFloat(cols[lonIndex]);
        const lat = parseFloat(cols[latIndex]);
        if (Number.isNaN(lon) || Number.isNaN(lat)) {
          return null;
        }
        const properties = { name: nameIndex >= 0 ? cols[nameIndex] : `Point ${idx + 1}` };
        header.forEach((key, i) => {
          if (key !== 'lon' && key !== 'lat' && cols[i] !== undefined) {
            properties[key] = cols[i];
          }
        });
        return {
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [lon, lat] },
          properties,
        };
      }).filter(Boolean);
    }

    function parseCSVRow(row) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < row.length; i++) {
        const char = row[i];
        if (char === '"') {
          if (inQuotes && row[i + 1] === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += char;
        }
      }
      result.push(current.trim());
      return result;
    }

    function groupFeaturesByGeometryType(geojson) {
      const groups = {};
      const features = geojson.type === 'FeatureCollection' ? geojson.features : [geojson];
      features.forEach(feature => {
        if (!feature || !feature.geometry) return;
        const type = feature.geometry.type;
        if (!groups[type]) groups[type] = [];
        groups[type].push(feature);
      });
      return groups;
    }

    function addGeoJSONLayer(geojson, displayName) {
      const groups = groupFeaturesByGeometryType(geojson);
      const geometryTypes = Object.keys(groups);

      const hasCustomColor = geojson && geojson.properties && geojson.properties.color && isValidColor(geojson.properties.color);
      const color = hasCustomColor ? geojson.properties.color : colorPalette[(currentLayerIndex) % colorPalette.length];

      Object.keys(groups).forEach(geometryType => {
        const id = `layer-${currentLayerIndex++}`;
        const sourceId = `${id}-source`;
        const fillLayerId = `${id}-fill`;
        const lineLayerId = `${id}-line`;
        const pointLayerId = `${id}-point`;
        const labelLayerId = `${id}-label`;
        const features = groups[geometryType];
        const featureCount = features.length;

        const typeGeojson = { type: 'FeatureCollection', features };

        map.addSource(sourceId, { type: 'geojson', data: typeGeojson });

        if (geometryType === 'Polygon' || geometryType === 'MultiPolygon') {
          map.addLayer({
            id: fillLayerId,
            type: 'fill',
            source: sourceId,
            paint: { 'fill-color': color, 'fill-opacity': 0.2 },
          });
          map.on('click', fillLayerId, (e) => {
            const feats = map.queryRenderedFeatures(e.point, { layers: [fillLayerId] });
            if (feats.length > 0) showFeaturePopup(feats[0], e.lngLat, subDisplayName);
          });
          map.on('mouseenter', fillLayerId, () => { map.getCanvas().style.cursor = 'pointer'; });
          map.on('mouseleave', fillLayerId, () => { map.getCanvas().style.cursor = ''; });
        }

        if (geometryType === 'LineString' || geometryType === 'MultiLineString' || geometryType === 'Polygon' || geometryType === 'MultiPolygon') {
          map.addLayer({
            id: lineLayerId,
            type: 'line',
            source: sourceId,
            paint: { 'line-color': color, 'line-width': 3 },
          });
          map.on('click', lineLayerId, (e) => {
            const feats = map.queryRenderedFeatures(e.point, { layers: [lineLayerId] });
            if (feats.length > 0) showFeaturePopup(feats[0], e.lngLat, subDisplayName);
          });
          map.on('mouseenter', lineLayerId, () => { map.getCanvas().style.cursor = 'pointer'; });
          map.on('mouseleave', lineLayerId, () => { map.getCanvas().style.cursor = ''; });
        }

        if (geometryType === 'Point' || geometryType === 'MultiPoint') {
          map.addLayer({
            id: pointLayerId,
            type: 'circle',
            source: sourceId,
            paint: { 'circle-radius': 6, 'circle-color': color, 'circle-stroke-color': '#ffffff', 'circle-stroke-width': 1.5 },
          });
          map.on('click', pointLayerId, (e) => {
            const feats = map.queryRenderedFeatures(e.point, { layers: [pointLayerId] });
            if (feats.length > 0) showFeaturePopup(feats[0], e.lngLat, subDisplayName);
          });
          map.on('mouseenter', pointLayerId, () => { map.getCanvas().style.cursor = 'pointer'; });
          map.on('mouseleave', pointLayerId, () => { map.getCanvas().style.cursor = ''; });
        }

        if (geometryType === 'Point' || geometryType === 'MultiPoint' || geometryType === 'LineString' || geometryType === 'MultiLineString' || geometryType === 'Polygon' || geometryType === 'MultiPolygon') {
          map.addLayer({
            id: labelLayerId,
            type: 'symbol',
            source: sourceId,
            layout: {
              'text-field': ['get', 'name'],
              'text-size': 12,
              'symbol-placement': 'point',
              'text-anchor': 'bottom',
              'text-offset': [0, 1.5],
              'visibility': 'none'
            },
            paint: {
              'text-color': color,
              'text-halo-color': '#ffffff',
              'text-halo-width': 2
            }
          });
        }

        const subDisplayName = `${displayName}`;
        activeLayers.push({ id, sourceId, fillLayerId, lineLayerId, pointLayerId, labelLayerId, featureCount, color, geojson: typeGeojson, displayName: subDisplayName, labelsVisible: false, labelProperty: null, labelFontSize: 12, labelFontColor: color, labelHaloColor: '#ffffff', labelHaloWidth: 2, dotRadius: 6, lineWidth: 3, fillOpacity: 0.2, circleStrokeWidth: 2, visible: true });
        addFileItem(subDisplayName, featureCount, id, color, geometryType);
        totalFeatures += featureCount;
      });

      if (geometryTypes.length > 0) {
        const allFeatures = geojson.type === 'FeatureCollection' ? geojson.features : [geojson];
        const bounds = new mapboxgl.LngLatBounds();
        allFeatures.forEach(feature => {
          if (!feature.geometry) return;
          const coords = feature.geometry.type === 'Point' ? [feature.geometry.coordinates] : getAllCoordinates(feature.geometry);
          coords.forEach(coord => bounds.extend(coord));
        });
        if (!bounds.isEmpty()) {
          map.fitBounds(bounds, { padding: 40, duration: 800, maxZoom: 14 });
        }
      }

      updateOverlay();
    }

    function getAllCoordinates(geometry) {
      const coords = [];
      const collect = array => array.forEach(item => Array.isArray(item[0]) ? collect(item) : coords.push(item));
      if (geometry.type === 'Point') return [geometry.coordinates];
      if (geometry.type === 'MultiPoint' || geometry.type === 'LineString') return geometry.coordinates;
      collect(geometry.coordinates);
      return coords;
    }

    function parseFile(file) {
      return new Promise((resolve, reject) => {
        const MAX_FILE_SIZE = 2 * 1024 * 1024 * 1024; // 2GB
        if (file.size > MAX_FILE_SIZE) {
          reject(new Error('File too large (max 2GB). Try simplifying or splitting the file.'));
          return;
        }
        if (file.size === 0) {
          reject(new Error('File is empty.'));
          return;
        }

        const reader = new FileReader();
        reader.onload = () => {
          const text = reader.result;
          if (!text || text.length === 0) {
            const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
            reject(new Error(`File appears empty after reading (file size: ${sizeMB}MB). Likely out of memory - try a smaller file.`));
            return;
          }

          const ext = file.name.split('.').pop().toLowerCase();
          if (ext === 'csv') {
            try {
              const features = parseCSV(text);
              resolve({ type: 'FeatureCollection', features });
            } catch (err) {
              if (err.message.includes('lon/lat')) {
                reject(err);
              } else {
                reject(new Error('CSV parsing error: ' + err.message));
              }
            }
          } else {
            try {
              const geojson = JSON.parse(text);
              resolve(geojson);
            } catch (err) {
              if (err.message.includes('out of memory') || err.message.includes('allocation failure')) {
                reject(new Error('File too large to process. Try a smaller or simplified file.'));
              } else {
                reject(new Error('Invalid GeoJSON: ' + err.message));
              }
            }
          }
        };
        reader.onerror = () => {
          if (reader.error && reader.error.name === 'AbortError') {
            reject(new Error('File reading was cancelled. Please try again.'));
          } else {
            reject(new Error('Unable to read file. The file may be corrupted or too large.'));
          }
        };
        reader.onabort = () => reject(new Error('File reading was cancelled.'));
        reader.readAsText(file);
      });
    }

    function downloadFile(content, filename, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function exportToGeoJSON() {
      if (activeLayers.length === 0) {
        alert('No layers to export.');
        return;
      }
      const features = getVisibleOrderedActiveLayers().flatMap(layer => {
        const data = layer.geojson;
        const feats = data.type === 'FeatureCollection' ? data.features : [data];
        return feats.map(f => ({
          ...f,
          properties: { ...f.properties, source: layer.displayName }
        }));
      });
      const geojson = { type: 'FeatureCollection', features };
      downloadFile(JSON.stringify(geojson, null, 2), 'geoviewer-export.geojson', 'application/geo+json');
    }

    function exportToHTML() {
      if (activeLayers.length === 0) {
        alert('No layers to export.');
        return;
      }
      const token = localStorage.getItem(STORED_TOKEN_KEY);
      if (!token) {
        alert('Please set a Mapbox access token first.');
        return;
      }
      const currentStyle = mapStyleSelect.value;
      const layersConfig = [];

      getVisibleOrderedActiveLayers().forEach(layer => {
        const data = layer.geojson;
        const feats = data.type === 'FeatureCollection' ? data.features : [data];
        layersConfig.push({
          name: layer.displayName,
          color: layer.color,
          geojson: { type: 'FeatureCollection', features: feats },
          featureCount: feats.length,
          dotRadius: layer.dotRadius ?? 6,
          lineWidth: layer.lineWidth ?? 3,
          fillOpacity: layer.fillOpacity ?? 0.2,
          circleStrokeWidth: layer.circleStrokeWidth ?? 2,
          labelProperty: layer.labelProperty,
          labelsVisible: layer.labelsVisible,
          labelFontSize: layer.labelFontSize,
          labelFontColor: layer.labelFontColor,
          labelHaloColor: layer.labelHaloColor,
          labelHaloWidth: layer.labelHaloWidth
        });
      });

      const initCenter = [map.getCenter().lng, map.getCenter().lat];
      const initZoom = map.getZoom();
      const title = document.getElementById('exportTitleInput').value.trim();

      const html = buildExportHTML(token, currentStyle, layersConfig, initCenter, initZoom, title);
      downloadFile(html, 'geoviewer-export.html', 'text/html');
    }

    function buildExportHTML(token, style, layers, center, zoom, title) {
      const esc = s => String(s).replace(/&/g, '&').replace(/</g, '<').replace(/>/g, '>').replace(/"/g, '"');
      const layersJson = JSON.stringify(layers);
      const mapTitle = title || 'Untitled Map';
      return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>${esc(mapTitle)}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css" rel="stylesheet">
<style>
  html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #map { position: absolute; inset: 0; }
  .mapboxgl-popup-content { font-size: 0.85rem; min-width: 300px; max-width: 600px; border-radius: 6px; box-shadow: 0 8px 12px rgba(0, 0, 0, 0.158); padding-top: 20px; }
  .mapboxgl-popup-content h4 { margin: 0 0 12px 0;
  color: gray;font-family: monospace; }
  #legend { position: absolute; top: 10px; left: 10px; background: #fff; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 1; min-width: 200px; max-width: 300px; }
  #legend-header { padding: 8px 12px; border-bottom: 1px solid #e5e5e5; font-weight: 600; font-size: 0.85rem; cursor: pointer; user-select: none; display: flex; justify-content: space-between; align-items: center; }
  #legend-header:hover { background: #f7f7f7; }
  #legend.collapsed #legend-list { display: none; }
  #legend-list { padding: 4px 0; max-height: 50vh; overflow-y: auto; }
  .legend-row { display: flex; align-items: center; padding: 6px 12px; gap: 8px; font-size: 0.8rem; cursor: pointer; }
  .legend-row:hover { background: #f5f5f5; }
  .legend-row input[type=checkbox] { cursor: pointer; margin: 0; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.1); }
  .legend-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .legend-count { color: #888; font-size: 0.7rem; }
  .popup-value { color: gray; font-weight: bold; font-family: monospace; font-size: 0.9rem }
  .popup-row { border-bottom: 1px solid rgba(0, 0, 0, 0.08); }
</style>
</head>
<body>
<div id="map"></div>
<div id="legend">
  <div id="legend-header">Legend</div>
  <div id="legend-list"></div>
</div>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.js"><\/script>
<script>
  mapboxgl.accessToken = "${esc(token)}";
  const STYLE_URL = "${esc(style)}";
  const LAYERS = ${layersJson};
  const INIT_CENTER = ${JSON.stringify(center)};
  const INIT_ZOOM = ${zoom};

  const map = new mapboxgl.Map({ container: 'map', style: STYLE_URL, center: INIT_CENTER, zoom: INIT_ZOOM, attributionControl: false });
  map.addControl(new mapboxgl.NavigationControl({ showCompass: true, showZoom: true }), 'top-right');

  function geometryTypes(gj) {
    const s = new Set();
    const feats = gj.type === 'FeatureCollection' ? gj.features : [gj];
    feats.forEach(f => { if (f && f.geometry) s.add(f.geometry.type); });
    return s;
  }
  function featureCount(gj) {
    return gj.type === 'FeatureCollection' ? gj.features.length : 1;
  }

  document.getElementById('legend-header').addEventListener('click', () => {
    document.getElementById('legend').classList.toggle('collapsed');
  });

  const legendList = document.getElementById('legend-list');

  map.on('load', () => {
    LAYERS.toReversed().forEach((layer, idx) => {
      const id = 'layer-' + idx;
      const subLayerIds = [];

      map.addSource(id, { type: 'geojson', data: layer.geojson });
      const types = geometryTypes(layer.geojson);
      const hasPoly = [...types].some(t => ['Polygon', 'MultiPolygon'].includes(t));
      const hasLine = [...types].some(t => ['LineString', 'MultiLineString'].includes(t));
      const hasPoint = [...types].some(t => ['Point', 'MultiPoint'].includes(t));

      const dotRadius = layer.dotRadius ?? 6;
      const lineWidth = layer.lineWidth ?? 3;
      const fillOpacity = layer.fillOpacity ?? 0.2;
      const circleStrokeWidth = layer.circleStrokeWidth ?? 2;

      if (hasPoly) {
        const fillId = id + '-fill', lineId = id + '-line';
        map.addLayer({ id: fillId, type: 'fill', source: id, paint: { 'fill-color': layer.color, 'fill-opacity': fillOpacity } });
        map.addLayer({ id: lineId, type: 'line', source: id, paint: { 'line-color': layer.color, 'line-width': lineWidth } });
        subLayerIds.push(fillId, lineId);
      }
      if (hasLine && !hasPoly) {
        const lineId = id + '-line';
        map.addLayer({ id: lineId, type: 'line', source: id, paint: { 'line-color': layer.color, 'line-width': lineWidth } });
        subLayerIds.push(lineId);
      }
      if (hasPoint) {
        const pointId = id + '-point';
        map.addLayer({ id: pointId, type: 'circle', source: id, paint: { 'circle-color': layer.color, 'circle-radius': dotRadius, 'circle-stroke-color': '#ffffff', 'circle-stroke-width': circleStrokeWidth } });
        subLayerIds.push(pointId);
      }
      if (layer.labelProperty) {
        const labelId = id + '-label';
        map.addLayer({ id: labelId, type: 'symbol', source: id,
          layout: { 'text-field': ['get', layer.labelProperty], 'text-size': layer.labelFontSize, 'symbol-placement': 'point', 'text-anchor': 'bottom', 'text-offset': [0, 1.5] },
          paint: { 'text-color': layer.labelFontColor, 'text-halo-color': layer.labelHaloColor, 'text-halo-width': layer.labelHaloWidth } });
        subLayerIds.push(labelId);
      }
      // console.log( subLayerIds );

      subLayerIds.forEach(sid => {
        map.on('click', sid, e => {
          const f = e.features[0];
          if (!f) return;
          const props = f.properties || {};
          
          // const rows = Object.entries(props).map(([k, v]) => '<tr><th>' + k + '</th><td>' + v + '</td></tr>').join('');
          // new mapboxgl.Popup().setLngLat(e.lngLat).setHTML('<table>' + rows + '</table>').addTo(map);

          const rows = '<h4>'+layer.name+'</h4>'+Object.entries(props).map(([k, v]) => '<div class="popup-row"><span>' + k + '</span> <span class="popup-value">' + v + '</span></div>').join('');
          new mapboxgl.Popup().setLngLat(e.lngLat).setHTML(rows).addTo(map);

        });
        map.on('mouseenter', sid, () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', sid, () => map.getCanvas().style.cursor = '');
      });

      const row = document.createElement('label');
      row.className = 'legend-row';
      row.innerHTML = '<input type="checkbox" checked data-idx="' + idx + '">' +
        '<span class="legend-swatch" style="background-color:' + layer.color + '"></span>' +
        '<span class="legend-name" title="' + layer.name.replace(/"/g, '"') + '">' + layer.name + '</span>' +
        '<span class="legend-count">' + featureCount(layer.geojson) + '</span>';
      legendList.prepend(row);

      row.querySelector('input').addEventListener('change', e => {
        const visibility = e.target.checked ? 'visible' : 'none';
        subLayerIds.forEach(sid => {
          if (map.getLayer(sid)) map.setLayoutProperty(sid, 'visibility', visibility);
        });
      });

    });
  });
<\/script>
</body>
</html>`;
    }

    function geojsonToWKT(geometry) {
      switch (geometry.type) {
        case 'Point': return `POINT(${geometry.coordinates[0]} ${geometry.coordinates[1]})`;
        case 'LineString': return `LINESTRING(${geometry.coordinates.map(c => c[0] + ' ' + c[1]).join(',')})`;
        case 'Polygon': return `POLYGON(${geometry.coordinates.map(ring => `(${ring.map(c => c[0] + ' ' + c[1]).join(',')})`).join(',')})`;
        case 'MultiPoint': return `MULTIPOINT(${geometry.coordinates.map(c => c[0] + ' ' + c[1]).join(',')})`;
        case 'MultiLineString': return `MULTILINESTRING(${geometry.coordinates.map(line => `(${line.map(c => c[0] + ' ' + c[1]).join(',')})`).join(',')})`;
        case 'MultiPolygon': return `MULTIPOLYGON(${geometry.coordinates.map(poly => `(${poly.map(ring => `(${ring.map(c => c[0] + ' ' + c[1]).join(',')})`).join(',')})`).join(',')})`;
        default: return '';
      }
    }

    function exportToCSV() {
      if (activeLayers.length === 0) {
        alert('No layers to export.');
        return;
      }
      const layers = getVisibleOrderedActiveLayers();

      const allProps = new Set(['name', 'source']);
      const sampleFeatures = [];
      layers.forEach(layer => {
        const feats = layer.geojson.type === 'FeatureCollection' ? layer.geojson.features : [layer.geojson];
        feats.forEach(f => {
          if (f.properties) {
            Object.keys(f.properties).forEach(k => allProps.add(k));
          }
          sampleFeatures.push({ layer, feature: f });
        });
      });

      const headers = [...allProps, 'wkt', 'lon', 'lat'];
      const rows = [headers.join(',')];

      sampleFeatures.forEach(({ layer, feature }) => {
        if (!feature.geometry) return;
        const wkt = geojsonToWKT(feature.geometry);
        let lon = '', lat = '';
        if (feature.geometry.type === 'Point') {
          lon = feature.geometry.coordinates[0];
          lat = feature.geometry.coordinates[1];
        }
        const props = feature.properties || {};
        const row = headers.map(h => {
          if (h === 'source') return `"${layer.displayName}"`;
          if (h === 'wkt') return `"${wkt}"`;
          if (h === 'lon') return lon;
          if (h === 'lat') return lat;
          if (h === 'name') {
            const name = props.name || feature.id || '';
            return `"${String(name).replace(/"/g, '""')}"`;
          }
          const val = props[h];
          if (val === null || val === undefined) return '';
          return `"${String(val).replace(/"/g, '""')}"`;
        });
        rows.push(row.join(','));
      });

      if (rows.length === 1) {
        alert('No features to export.');
        return;
      }
      downloadFile(rows.join('\n'), 'geoviewer-export.csv', 'text/csv');
    }

    document.getElementById('exportGeoJSONBtn').addEventListener('click', exportToGeoJSON);
    document.getElementById('exportCSVBtn').addEventListener('click', exportToCSV);
    document.getElementById('exportHTMLBtn').addEventListener('click', exportToHTML);
    document.getElementById('snapshotBtn').addEventListener('click', () => {
      map.once('render', () => {
        const canvas = map.getCanvas();
        const dataURL = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        const pad = n => n.toString().padStart(2, '0');
        const d = new Date();
        link.download = `snapshot-${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}.png`;
        link.href = dataURL;
        link.click();
      });
      map.triggerRepaint();
    });

    fileButton.addEventListener('click', () => {
      fileInput.click();
    });

    document.getElementById('removeAllBtn').addEventListener('click', () => {
      const layersToRemove = [...activeLayers];
      layersToRemove.forEach(layer => removeLayer(layer.id));
    });

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        if (file.size > 50 * 1024 * 1024) {
          reject(new Error('File too large (max 50MB).'));
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('Failed to read file.'));
        reader.readAsText(file);
      });
    }

    function parseExportedHTML(html) {
      const layersMatch = html.match(/const\s+LAYERS\s*=\s*(\[[\s\S]*?\]);/);
      const styleMatch = html.match(/const\s+STYLE_URL\s*=\s*"([^"]*)"/);
      const centerMatch = html.match(/const\s+INIT_CENTER\s*=\s*(\[[^\]]*\])/);
      const zoomMatch = html.match(/const\s+INIT_ZOOM\s*=\s*([\d.]+)/);
      const titleMatch = html.match(/<title>([^<]*)<\/title>/);

      if (!layersMatch || !styleMatch || !centerMatch || !zoomMatch) {
        throw new Error('Not a valid GeoViewer export. Missing required data (LAYERS, STYLE_URL, INIT_CENTER, or INIT_ZOOM).');
      }

      return {
        layers: JSON.parse(layersMatch[1]),
        style: styleMatch[1],
        center: JSON.parse(centerMatch[1]),
        zoom: parseFloat(zoomMatch[1]),
        title: titleMatch ? titleMatch[1] : null
      };
    }

    function addImportedLayer(importedLayer) {
      currentLayerIndex++;
      const id = 'layer-' + currentLayerIndex;
      const sourceId = id + '-source';
      const fillLayerId = id + '-fill';
      const lineLayerId = id + '-line';
      const pointLayerId = id + '-point';
      const labelLayerId = id + '-label';

      const types = new Set();
      const feats = importedLayer.geojson.type === 'FeatureCollection' ? importedLayer.geojson.features : [importedLayer.geojson];
      feats.forEach(f => { if (f && f.geometry) types.add(f.geometry.type); });

      const subDisplayName = importedLayer.name || 'Imported Layer';
      const geometryType = [...types][0] || 'Unknown';

      const layer = {
        id,
        sourceId,
        fillLayerId,
        lineLayerId,
        pointLayerId,
        labelLayerId,
        featureCount: importedLayer.featureCount || feats.length,
        color: importedLayer.color,
        geojson: importedLayer.geojson,
        displayName: subDisplayName,
        labelsVisible: importedLayer.labelsVisible ?? false,
        labelProperty: importedLayer.labelProperty || null,
        labelFontSize: importedLayer.labelFontSize || 12,
        labelFontColor: importedLayer.labelFontColor || importedLayer.color,
        labelHaloColor: importedLayer.labelHaloColor || '#ffffff',
        labelHaloWidth: importedLayer.labelHaloWidth || 2,
        dotRadius: importedLayer.dotRadius ?? 6,
        lineWidth: importedLayer.lineWidth ?? 3,
        fillOpacity: importedLayer.fillOpacity ?? 0.2,
        circleStrokeWidth: importedLayer.circleStrokeWidth ?? 2,
        visible: true
      };

      activeLayers.push(layer);
      addLayerFromStored(layer);
      addFileItem(layer.displayName, layer.featureCount, id, layer.color, geometryType);
      totalFeatures += layer.featureCount;
    }

    function applyImportedData(data) {
      const layersToRemove = [...activeLayers];
      layersToRemove.forEach(layer => removeLayer(layer.id));

      if (mapStyleSelect && data.style && data.style !== mapStyleSelect.value) {
        const styleExists = Array.from(mapStyleSelect.options).some(opt => opt.value === data.style);
        if (styleExists) {
          mapStyleSelect.value = data.style;
          mapStyleSelect.dispatchEvent(new Event('change'));
        }
      }

      data.layers.reverse().forEach(importedLayer => addImportedLayer(importedLayer));

      if (map && data.center && typeof data.zoom === 'number') {
        map.flyTo({ center: data.center, zoom: data.zoom });
      }

      if (data.title) {
        const titleInput = document.getElementById('exportTitleInput');
        if (titleInput) titleInput.value = data.title;
      }

      updateOverlay();
    }

    fileInput.addEventListener('change', async event => {
      const files = Array.from(event.target.files || []);
      if (files.length === 0) return;

      for (const file of files) {
        try {
          const geojson = await parseFile(file);
          addGeoJSONLayer(geojson, file.name);
        } catch (error) {
          let msg = error.message;
          if (msg.includes('out of memory') || msg.includes('empty after reading')) {
            msg += '\n\nSuggestions:\n- Simplify the file (reduce coordinates precision)\n- Split into multiple smaller files\n- Remove unnecessary properties';
          }
          alert(`Error processing ${file.name}: ${msg}`);
        }
      }
      fileInput.value = '';
    });

    document.getElementById('loadHtmlBtn').addEventListener('click', () => {
      document.getElementById('loadHtmlInput').click();
    });

    document.getElementById('loadHtmlInput').addEventListener('change', async event => {
      const file = event.target.files[0];
      if (!file) return;
      try {
        const text = await readFileAsText(file);
        const data = parseExportedHTML(text);
        applyImportedData(data);
      } catch (err) {
        alert('Failed to load HTML: ' + err.message);
        console.error(err);
      }
      event.target.value = '';
    });

    if (map) {
      map.on('load', () => {
        updateOverlay();
      });

      map.on('mousemove', event => {
        const coords = document.getElementById('mapCoords');
        if (coords) {
          coords.textContent = `Lat: ${event.lngLat.lat.toFixed(6)}  Lon: ${event.lngLat.lng.toFixed(6)}`;
        }
      });

      map.on('click', event => {
        const interactiveLayerIds = activeLayers.flatMap(layer => [layer.fillLayerId, layer.lineLayerId, layer.pointLayerId]).filter(Boolean).filter(id => map.getLayer(id));
        if (interactiveLayerIds.length === 0) {
          removePopup();
          return;
        }
        const clickedFeatures = map.queryRenderedFeatures(event.point, { layers: interactiveLayerIds });
        if (clickedFeatures.length === 0) {
          removePopup();
        }
      });

      map.on('contextmenu', event => {
        event.preventDefault();
        const mapRect = map.getCanvas().getBoundingClientRect();
        const x = mapRect.left + event.point.x;
        const y = mapRect.top + event.point.y;
        showContextMenu(event.lngLat.lng, event.lngLat.lat, x, y);
      });
    }
  </script>
</body>
</html>
